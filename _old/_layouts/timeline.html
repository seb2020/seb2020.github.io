<!DOCTYPE html>
<html lang="en" height="100%">

{% include head.html %}

<body>
  <style>
    html {
      height: 100%;
    }

    body {
      height: inherit;
      display: flex;
      flex-direction: column;
    }

    div.container {
      display: flex;
      flex: auto;
      flex-direction: column;
      max-height: 100%;
    }

    div.header {
      height: auto;
      text-align: center;
      padding: 2.3rem 1rem 2.3rem 1rem;
      position: relative;
    }
    div.header:after {
      content: '';
      position: absolute;
      bottom: -5rem;
      left: 0rem;
      height: 5.1rem;
      display: block;
      width: 100%;
      z-index: 300;
      background: -moz-linear-gradient(top, white 20%, rgba(255, 255, 255, 0) 100%);
      /* FF3.6-15 */
      background: -webkit-linear-gradient(top, white 20%, rgba(255, 255, 255, 0) 100%);
      /* Chrome10-25,Safari5.1-6 */
      background: linear-gradient(to bottom, white 20%, rgba(255, 255, 255, 0) 100%);
      /* W3C, IE10+, FF16+, Chrome26+, Opera12+, Safari7+ */
      filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#ffffff', endColorstr='#00ffffff',GradientType=0 );
      /* IE6-9 */
    }
    div.header h1 {
      margin-top: .8rem;
      margin-bottom: .5rem;
      font-weight: 200;
      font-size: 1.6em;
      letter-spacing: 0.1rem;
      text-transform: uppercase;
    }
    @media (min-width: 62em) {
      div.header h1 {
        font-size: 1.9em;
        letter-spacing: 0.2rem;
      }
    }
    div.header h2 {
      font-size: 1.1em;
      font-weight: 400;
      max-width: 30rem;
      margin: auto;
    }

    div.item {
      display: flex;
      flex: auto;
      overflow-y: auto;
      padding: 0rem 1rem 0rem 1rem;
    }
  </style>

  <div class="journey_item">
    <div class="container">
      <div class="header">
        <span class="salutation">{% include header.html %} The Journey so far...</span>
      </div>
      {{content}}
      {% if page.home %}
        {% include home-footer.html %}
      {% else %}
        {% include footer.html %}
      {% endif %}
    </div>
  </div>

</body>
</html>
